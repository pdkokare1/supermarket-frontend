<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DailyPick | Quick Market</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-brand">
            <h1>DAILYPICK</h1>
            <p class="header-subtitle">Fresh groceries, sorted.</p>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Search 'Milk', 'Bread', 'Eggs'..." oninput="handleSearch(event)">
        </div>
    </header>

    <article id="shop-view" class="view-section active">
        <nav id="category-nav" class="category-nav">
            </nav>

        <main id="skeleton-grid" class="product-grid">
            <div class="skeleton-card"><div class="skel-img"></div><div class="skel-text"></div><div class="skel-btn"></div></div>
            <div class="skeleton-card"><div class="skel-img"></div><div class="skel-text"></div><div class="skel-btn"></div></div>
            <div class="skeleton-card"><div class="skel-img"></div><div class="skel-text"></div><div class="skel-btn"></div></div>
            <div class="skeleton-card"><div class="skel-img"></div><div class="skel-text"></div><div class="skel-btn"></div></div>
        </main>

        <main id="storefront" class="product-grid hidden"></main>
    </article>

    <article id="orders-view" class="view-section hidden">
        <main class="tracking-container">
            <div class="tracking-header">
                <h2>Active Order</h2>
                <button class="refresh-btn" onclick="checkOrderStatus()">↻ Refresh</button>
            </div>
            <div id="tracking-content">
                <p class="empty-state">You have no active orders right now.</p>
            </div>
        </main>
    </article>

    <div id="cart-ribbon" class="cart-ribbon hidden" onclick="openCart()">
        <div class="ribbon-info">
            <span id="ribbon-items-count" class="ribbon-qty">1 ITEM</span>
            <span id="ribbon-total-price" class="ribbon-price">₹0</span>
        </div>
        <div class="ribbon-action">View Cart <span>▶</span></div>
    </div>

    <section id="cart-view" class="cart-view">
        <div class="cart-header">
            <button class="back-btn" onclick="closeCart()">← Back</button>
            <h2>Checkout</h2>
            <div style="width: 60px;"></div>
        </div>
        
        <div id="cart-items-container" class="cart-items"></div>

        <div class="schedule-section">
            <h3 class="delivery-title" style="margin-bottom: 12px;">Delivery Speed</h3>
            <div class="delivery-tabs">
                <button id="tab-instant" class="del-tab active" onclick="setDeliveryType('Instant')">⚡ Instant</button>
                <button id="tab-routine" class="del-tab" onclick="setDeliveryType('Routine')">📅 Daily Routine</button>
            </div>
            <div id="routine-options" class="hidden" style="margin-top: 16px;">
                <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block; text-transform: uppercase;">Select Routine Time</label>
                <select id="schedule-time" class="delivery-input">
                    <option value="Daily at 7:00 AM">Morning (7:00 AM)</option>
                    <option value="Daily at 6:00 PM">Evening (6:00 PM)</option>
                </select>
            </div>
        </div>

        <div class="delivery-section">
            <h3 class="delivery-title">Delivery Details</h3>
            <input type="text" id="cust-name" class="delivery-input" placeholder="Your Name" required>
            <input type="tel" id="cust-phone" class="delivery-input" placeholder="Phone Number" required>
            <textarea id="cust-address" class="delivery-input" placeholder="Complete Address (Flat, Building, Street)" rows="2" required></textarea>
        </div>

        <div class="cart-footer">
            <div class="summary-row"><span>Subtotal</span><span id="cart-subtotal">₹0</span></div>
            <div class="summary-row"><span>Delivery</span><span id="cart-delivery">₹20</span></div>
            <hr class="summary-divider">
            <div class="summary-row total-row"><span>To Pay</span><span id="cart-total">₹0</span></div>
            <button class="primary-btn checkout-btn" onclick="placeOrder()">Place Order</button>
        </div>
    </section>

    <div id="toast-container"></div>

    <nav class="bottom-nav">
        <button id="nav-shop" class="nav-item active" onclick="switchView('shop')"><span class="nav-icon">⬡</span><span class="nav-label">Shop</span></button>
        <button id="nav-orders" class="nav-item" onclick="switchView('orders')"><span class="nav-icon">📦</span><span class="nav-label">Orders</span></button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
